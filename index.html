<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabunganku - Premium Fintech Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#090a0f',
                        darkCard: 'rgba(17, 19, 31, 0.65)',
                        neonCyan: '#00f2fe',
                        neonBlue: '#4facfe',
                        neonPurple: '#7f00ff',
                        neonPink: '#e100ff',
                    },
                    boxShadow: {
                        neonCyan: '0 0 15px rgba(0, 242, 254, 0.4)',
                        neonPurple: '0 0 15px rgba(127, 0, 255, 0.4)',
                        glass: '0 8px 32px 0 rgba(0, 0, 0, 0.37)',
                    }
                }
            }
        }
    </script>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
            background-color: #090a0f;
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
        ::-webkit-scrollbar-thumb { background: rgba(0, 242, 254, 0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(127, 0, 255, 0.6); }
        
        /* Glassmorphism Blur */
        .glass-panel {
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        /* Background Animated Gradient & Particles */
        .bg-glow-1 {
            background: radial-gradient(circle, rgba(79,172,254,0.15) 0%, rgba(0,0,0,0) 70%);
        }
        .bg-glow-2 {
            background: radial-gradient(circle, rgba(225,0,255,0.12) 0%, rgba(0,0,0,0) 70%);
        }
        
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .animate-float { animation: float 4s ease-in-out infinite; }
    </style>
</head>
<body class="text-slate-100 antialiased selection:bg-neonCyan selection:text-darkBg">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = Motion;

        // --- MOCK INITIAL DATA ---
        const initialTransactions = [
            { id: 1, type: 'pemasukan', amount: 5000000, category: 'Gaji', note: 'Project Web Kelar', date: '2026-05-20' },
            { id: 2, type: 'pengeluaran', amount: 350000, category: 'Makanan', note: 'Dinner Premium', date: '2026-05-22' },
            { id: 3, type: 'pemasukan', amount: 1200000, category: 'Investasi', note: 'Dividen Saham', date: '2026-05-23' },
            { id: 4, type: 'pengeluaran', amount: 150000, category: 'Hiburan', note: 'Nonton Bioskop IMAX', date: '2026-05-24' }
        ];

        const initialTargets = [
            { id: 1, name: 'Setup PC Gaming 2026', target: 25000000, current: 15000000, deadline: '2026-12-31' },
            { id: 2, name: 'Liburan ke Tokyo', target: 30000000, current: 8500000, deadline: '2027-04-15' }
        ];

        const initialWishlist = [
            { id: 1, name: 'iPhone 17 Pro Max', price: 24000000, saved: 12000000, image: 'https://images.unsplash.com/photo-1510557880182-3d4d3cba35a5?w=400&auto=format&fit=crop&q=60' },
            { id: 2, name: 'Keyboard Mechanical Custom', price: 3500000, saved: 3500000, image: 'https://images.unsplash.com/photo-1618384887929-16ec33fab9ef?w=400&auto=format&fit=crop&q=60' }
        ];

        // --- UTILS ---
        const formatRupiah = (num) => {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);
        };

        const parseCurrency = (str) => {
            return Number(str.replace(/[^0-9]/g, ''));
        };

        function App() {
            // --- STATES ---
            const [isLoading, setIsLoading] = useState(true);
            const [isDarkMode, setIsDarkMode] = useState(true);
            const [activeTab, setActiveTab] = useState('Dashboard');
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [toasts, setToasts] = useState([]);
            
            // Core Data States
            const [transactions, setTransactions] = useState(() => JSON.parse(localStorage.getItem('tb_txs')) || initialTransactions);
            const [targets, setTargets] = useState(() => JSON.parse(localStorage.getItem('tb_targets')) || initialTargets);
            const [wishlist, setWishlist] = useState(() => JSON.parse(localStorage.getItem('tb_wishlist')) || initialWishlist);

            // Transaction Form State
            const [txType, setTxType] = useState('pemasukan');
            const [txAmount, setTxAmount] = useState('');
            const [txCategory, setTxCategory] = useState('Gaji');
            const [txNote, setTxNote] = useState('');
            const [txDate, setTxDate] = useState(new Date().toISOString().split('T')[0]);
            const [editingTxId, setEditingTxId] = useState(null);

            // Filter & Search States
            const [searchQuery, setSearchQuery] = useState('');
            const [filterTime, setFilterTime] = useState('Semua');
            const [filterType, setFilterType] = useState('Semua');

            // Target & Wishlist Form States
            const [newTargetName, setNewTargetName] = useState('');
            const [newTargetAmount, setNewTargetAmount] = useState('');
            const [newTargetDeadline, setNewTargetDeadline] = useState('');
            const [newWishName, setNewWishName] = useState('');
            const [newWishPrice, setNewWishPrice] = useState('');
            const [newWishImage, setNewWishImage] = useState('');

            // --- LOCAL STORAGE SYNC ---
            useEffect(() => { localStorage.setItem('tb_txs', JSON.stringify(transactions)); }, [transactions]);
            useEffect(() => { localStorage.setItem('tb_targets', JSON.stringify(targets)); }, [targets]);
            useEffect(() => { localStorage.setItem('tb_wishlist', JSON.stringify(wishlist)); }, [wishlist]);

            // --- SIMULATE INITIAL LOADING ---
            useEffect(() => {
                setTimeout(() => {
                    setIsLoading(false);
                    showToast('Selamat Datang di Tabunganku v2026', 'info');
                }, 1800);
            }, []);

            // Lucide Icons Render Trigger
            useEffect(() => { if (!isLoading) lucide.createIcons(); }, [isLoading, activeTab, isSidebarOpen, transactions, targets, wishlist]);

            // --- TOAST SYSTEM ---
            const showToast = (msg, type = 'success') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, msg, type }]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 4000);
            };

            // --- FINANCIAL CALCULATION ---
            const totalPemasukan = transactions.filter(t => t.type === 'pemasukan').reduce((acc, curr) => acc + curr.amount, 0);
            const totalPengeluaran = transactions.filter(t => t.type === 'pengeluaran').reduce((acc, curr) => acc + curr.amount, 0);
            const totalSaldo = totalPemasukan - totalPengeluaran;

            // --- HANDLERS ---
            const handleAddTransaction = (e) => {
                e.preventDefault();
                if (!txAmount || parseCurrency(txAmount) <= 0) return showToast('Nominal harus diisi dengan benar!', 'error');

                if (editingTxId) {
                    setTransactions(prev => prev.map(t => t.id === editingTxId ? {
                        ...t, type: txType, amount: parseCurrency(txAmount), category: txCategory, note: txNote, date: txDate
                    } : t));
                    setEditingTxId(null);
                    showToast('Transaksi berhasil diperbarui!');
                } else {
                    const newTx = {
                        id: Date.now(),
                        type: txType,
                        amount: parseCurrency(txAmount),
                        category: txCategory,
                        note: txNote,
                        date: txDate
                    };
                    setTransactions(prev => [newTx, ...prev]);
                    showToast('Transaksi berhasil ditambahkan!');
                }
                // Reset form
                setTxAmount('');
                setTxNote('');
            };

            const handleEditTx = (tx) => {
                setEditingTxId(tx.id);
                setTxType(tx.type);
                setTxAmount(tx.amount.toString());
                setTxCategory(tx.category);
                setTxNote(tx.note);
                setTxDate(tx.date);
                if(activeTab !== 'Dashboard' && activeTab !== 'Pemasukan' && activeTab !== 'Pengeluaran') {
                    setActiveTab('Dashboard');
                }
            };

            const handleDeleteTx = (id) => {
                setTransactions(prev => prev.filter(t => t.id !== id));
                showToast('Transaksi berhasil dihapus', 'error');
            };

            const handleAddTarget = (e) => {
                e.preventDefault();
                if(!newTargetName || !newTargetAmount || !newTargetDeadline) return showToast('Harap isi semua field target!', 'error');
                const nt = {
                    id: Date.now(),
                    name: newTargetName,
                    target: parseCurrency(newTargetAmount),
                    current: 0,
                    deadline: newTargetDeadline
                };
                setTargets(prev => [...prev, nt]);
                setNewTargetName('');
                setNewTargetAmount('');
                setNewTargetDeadline('');
                showToast('Target Impian berhasil dibuat!');
            };

            const handleAddWishlist = (e) => {
                e.preventDefault();
                if(!newWishName || !newWishPrice) return showToast('Nama dan harga barang wajib diisi!', 'error');
                const nw = {
                    id: Date.now(),
                    name: newWishName,
                    price: parseCurrency(newWishPrice),
                    saved: 0,
                    image: newWishImage || 'https://images.unsplash.com/photo-1531403009284-440f080d1e12?w=400&auto=format&fit=crop&q=60'
                };
                setWishlist(prev => [...prev, nw]);
                setNewWishName('');
                setNewWishPrice('');
                setNewWishImage('');
                showToast('Barang impian berhasil masuk wishlist!');
            };

            const simulateExport = (type) => {
                showToast(`Sedang memproses export ke ${type}...`, 'info');
                setTimeout(() => {
                    showToast(`File Tabunganku_${type.toUpperCase()}_Berhasil_Diunduh!`);
                }, 1500);
            };

            // --- RENDER COMPONENT WIDGETS ---
            return (
                <div className={`min-h-screen ${isDarkMode ? 'dark bg-darkBg text-slate-100' : 'bg-slate-50 text-slate-900 transition-colors duration-300'}`}>
                    
                    {/* Background Animation Layers */}
                    <div className="fixed inset-0 pointer-events-none z-0 overflow-hidden">
                        <div className="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] bg-glow-1 rounded-full blur-[120px] animate-pulse"></div>
                        <div className="absolute bottom-[-10%] right-[-10%] w-[50vw] h-[50vw] bg-glow-2 rounded-full blur-[120px] animate-pulse" style={{ animationDuration: '6s' }}></div>
                        {/* Futuristic Grid Line */}
                        <div className="absolute inset-0 opacity-[0.015] dark:opacity-[0.03] bg-[linear-gradient(to_right,#808080_1px,transparent_1px),linear-gradient(to_bottom,#808080_1px,transparent_1px)] bg-[size:30px_30px]"></div>
                    </div>

                    {/* SKELETON / LOADING SCREEN */}
                    <AnimatePresence>
                        {isLoading && (
                            <motion.div 
                                className="fixed inset-0 bg-[#090a0f] z-50 flex flex-col justify-center items-center"
                                exit={{ opacity: 0, transition: { duration: 0.6, ease: 'easeInOut' } }}
                            >
                                <motion.div 
                                    className="relative w-24 h-24 flex items-center justify-center mb-4"
                                    initial={{ scale: 0.8, opacity: 0 }}
                                    animate={{ scale: [1, 1.1, 1], opacity: 1 }}
                                    transition={{ repeat: Infinity, duration: 1.5 }}
                                >
                                    <div className="absolute inset-0 rounded-full border-4 border-t-neonCyan border-r-neonPurple border-b-transparent border-l-transparent animate-spin"></div>
                                    <i data-lucide="wallet" className="w-10 h-10 text-neonCyan animate-pulse"></i>
                                </motion.div>
                                <motion.h1 
                                    className="text-2xl font-extrabold tracking-wider bg-gradient-to-r from-neonCyan via-neonBlue to-neonPurple bg-clip-text text-transparent"
                                    initial={{ letterSpacing: '0.1em', opacity: 0 }}
                                    animate={{ letterSpacing: '0.2em', opacity: 1 }}
                                    transition={{ duration: 1 }}
                                >
                                    TABUNGANKU OS
                                </motion.h1>
                                <p className="text-xs text-slate-500 mt-2 tracking-widest uppercase">Fintech Ecosystem v2.26</p>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    {/* TOAST NOTIFICATION CONTAINER */}
                    <div className="fixed top-5 right-5 z-50 flex flex-col gap-3 pointer-events-none">
                        <AnimatePresence>
                            {toasts.map(t => (
                                <motion.div
                                    key={t.id}
                                    layout
                                    initial={{ opacity: 0, y: -20, scale: 0.9 }}
                                    animate={{ opacity: 1, y: 0, scale: 1 }}
                                    exit={{ opacity: 0, scale: 0.8, transition: { duration: 0.2 } }}
                                    className={`glass-panel pointer-events-auto flex items-center p-4 rounded-xl shadow-lg border-l-4 min-w-[280px] ${
                                        t.type === 'error' ? 'border-red-500 bg-red-950/40 text-red-200' : 
                                        t.type === 'info' ? 'border-neonBlue bg-blue-950/40 text-blue-200' : 'border-neonCyan bg-slate-900/80 text-neonCyan'
                                    }`}
                                >
                                    <i data-lucide={t.type === 'error' ? 'alert-triangle' : t.type === 'info' ? 'info' : 'check-circle'} className="w-5 h-5 mr-3 flex-shrink-0"></i>
                                    <span className="text-sm font-medium">{t.msg}</span>
                                </motion.div>
                            ))}
                        </AnimatePresence>
                    </div>

                    {/* TOP NAVBAR */}
                    <nav className="sticky top-0 z-40 glass-panel border-b border-white/5 backdrop-blur-md px-4 py-3 lg:px-8 flex justify-between items-center transition-all duration-300">
                        <div className="flex items-center gap-4">
                            <motion.button 
                                whileTap={{ scale: 0.9 }}
                                onClick={() => setIsSidebarOpen(true)}
                                className="p-2 rounded-xl bg-white/5 hover:bg-white/10 text-slate-200 transition-all border border-white/5 shadow-inner"
                            >
                                <i data-lucide="menu" className="w-6 h-6"></i>
                            </motion.button>
                            <div className="flex items-center gap-2">
                                <div className="p-2 rounded-xl bg-gradient-to-br from-neonCyan to-neonPurple shadow-neonCyan/20 shadow-lg">
                                    <i data-lucide="trending-up" className="w-5 h-5 text-darkBg"></i>
                                </div>
                                <span className="text-lg font-bold tracking-tight bg-gradient-to-r from-white via-slate-200 to-slate-400 bg-clip-text text-transparent">
                                    Tabunganku<span className="text-neonCyan font-black text-xs ml-1 bg-neonCyan/10 px-1.5 py-0.5 rounded border border-neonCyan/20">2026</span>
                                </span>
                            </div>
                        </div>

                        {/* Right Elements */}
                        <div className="flex items-center gap-3">
                            <motion.button 
                                whileHover={{ scale: 1.05 }} whileTap={{ scale: 0.95 }}
                                onClick={() => {
                                    setIsDarkMode(!isDarkMode);
                                    document.documentElement.classList.toggle('dark');
                                    showToast(`Mode ${!isDarkMode ? 'Dark' : 'Light'} Diaktifkan`, 'info');
                                }}
                                className="p-2.5 rounded-xl bg-white/5 hover:bg-white/10 transition-all border border-white/5 text-amber-400 dark:text-indigo-400"
                            >
                                <i data-lucide={isDarkMode ? "sun" : "moon"} className="w-5 h-5"></i>
                            </motion.button>
                            <div className="hidden sm:flex items-center gap-3 border-l border-white/10 pl-3">
                                <div className="w-8 h-8 rounded-xl bg-gradient-to-tr from-neonPurple to-neonPink p-[1px]">
                                    <div className="w-full h-full rounded-xl bg-darkBg flex items-center justify-center font-bold text-xs text-neonCyan">RA</div>
                                </div>
                                <span className="text-xs font-semibold tracking-wide text-slate-400">Reza Aditya</span>
                            </div>
                        </div>
                    </nav>

                    {/* SIDEBAR COMPONENT */}
                    <AnimatePresence>
                        {isSidebarOpen && (
                            <>
                                {/* Overlay */}
                                <motion.div 
                                    initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}
                                    onClick={() => setIsSidebarOpen(false)}
                                    className="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm"
                                />
                                {/* Content */}
                                <motion.div 
                                    initial={{ x: '-100%' }} animate={{ x: 0 }} exit={{ x: '-100%' }}
                                    transition={{ type: 'spring', damping: 25, stiffness: 200 }}
                                    className="fixed top-0 left-0 bottom-0 z-50 w-72 glass-panel bg-darkBg/80 backdrop-blur-xl border-r border-white/10 p-6 flex flex-col shadow-2xl"
                                >
                                    <div className="flex justify-between items-center mb-8">
                                        <div className="flex items-center gap-2">
                                            <i data-lucide="activity" className="w-5 h-5 text-neonPurple animate-pulse"></i>
                                            <span className="font-extrabold tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-neonCyan to-neonPurple">MENU UTAMA</span>
                                        </div>
                                        <button onClick={() => setIsSidebarOpen(false)} className="p-1.5 rounded-lg hover:bg-white/10 text-slate-400"><i data-lucide="x" className="w-5 h-5"></i></button>
                                    </div>

                                    <div className="flex flex-col gap-2 flex-grow">
                                        {[
                                            { name: 'Dashboard', icon: 'layout-dashboard' },
                                            { name: 'Pemasukan', icon: 'arrow-down-left' },
                                            { name: 'Pengeluaran', icon: 'arrow-up-right' },
                                            { name: 'Target Tabungan', icon: 'target' },
                                            { name: 'Wish List', icon: 'heart' },
                                            { name: 'Riwayat Transaksi', icon: 'history' },
                                            { name: 'Laporan', icon: 'pie-chart' },
                                            { name: 'Pengaturan', icon: 'sliders' }
                                        ].map((item) => {
                                            const isActive = activeTab === item.name;
                                            return (
                                                <motion.button
                                                    key={item.name}
                                                    whileHover={{ x: 4, backgroundColor: 'rgba(255,255,255,0.05)' }}
                                                    onClick={() => {
                                                        setActiveTab(item.name);
                                                        setIsSidebarOpen(false);
                                                        if(item.name === 'Pemasukan') { setTxType('pemasukan'); setActiveTab('Dashboard'); }
                                                        if(item.name === 'Pengeluaran') { setTxType('pengeluaran'); setActiveTab('Dashboard'); }
                                                    }}
                                                    className={`flex items-center gap-3 px-4 py-3 rounded-xl transition-all text-sm font-medium ${
                                                        isActive 
                                                        ? 'bg-gradient-to-r from-neonBlue/20 to-neonPurple/20 text-neonCyan border-l-4 border-neonCyan shadow-neonCyan/10 shadow-md' 
                                                        : 'text-slate-400 hover:text-slate-100'
                                                    }`}
                                                >
                                                    <i data-lucide={item.icon} className={`w-5 h-5 ${isActive ? 'text-neonCyan' : ''}`}></i>
                                                    {item.name}
                                                </motion.button>
                                            );
                                        })}
                                    </div>
                                    
                                    <div className="pt-4 border-t border-white/5 text-center text-[10px] text-slate-500 tracking-widest font-mono">
                                        TABUNGANKU CORE v2.26
                                    </div>
                                </motion.div>
                            </>
                        )}
                    </AnimatePresence>

                    {/* MAIN CONTENT SPACE CONTAINER */}
                    <main className="relative z-10 max-w-7xl mx-auto px-4 py-6 lg:px-8 space-y-8 pb-20">
                        
                        {/* VIEW METADATA BANNER */}
                        <motion.div 
                            initial={{ opacity: 0, y: 15 }} animate={{ opacity: 1, y: 0 }}
                            className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 border-b border-white/5 pb-4"
                        >
                            <div>
                                <h2 className="text-3xl font-extrabold tracking-tight bg-gradient-to-r from-white via-slate-100 to-slate-400 bg-clip-text text-transparent">
                                    {activeTab === 'Dashboard' ? 'Sistem Finansial' : activeTab}
                                </h2>
                                <p className="text-xs text-slate-400 mt-1">Sistem manajemen dan pelacakan tabungan personal otomatis modern.</p>
                            </div>
                            <div className="px-4 py-2 rounded-xl glass-panel text-xs font-mono font-bold text-neonCyan flex items-center gap-2 shadow-inner">
                                <span className="w-2 h-2 rounded-full bg-emerald-500 animate-ping"></span>
                                LIVE STORAGE SYNC ACTIVE
                            </div>
                        </motion.div>

                        {/* --- PAGE: DASHBOARD --- */}
                        {activeTab === 'Dashboard' && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                
                                {/* Left/Center Column (Cards, Quick Actions, Charts) */}
                                <div className="lg:col-span-2 space-y-8">
                                    
                                    {/* 3 Utama Metrics Cards */}
                                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                                        {/* Card Saldo */}
                                        <motion.div 
                                            whileHover={{ y: -5 }}
                                            className="glass-panel p-5 rounded-2xl relative overflow-hidden bg-gradient-to-br from-darkCard to-indigo-950/20 shadow-neonCyan/5 shadow-2xl group animate-float"
                                        >
                                            <div className="absolute -top-10 -right-10 w-24 h-24 bg-neonCyan/10 rounded-full blur-xl group-hover:bg-neonCyan/20 transition-all duration-500"></div>
                                            <div className="flex justify-between items-start mb-4">
                                                <span className="text-xs font-bold text-neonCyan uppercase tracking-widest">Total Saldo</span>
                                                <div className="p-2 rounded-xl bg-neonCyan/10 text-neonCyan"><i data-lucide="wallet" className="w-4 h-4"></i></div>
                                            </div>
                                            <h3 className="text-2xl font-black tracking-tight text-white mb-1 shadow-neonCyan">{formatRupiah(totalSaldo)}</h3>
                                            <span className="text-[10px] text-slate-400 flex items-center gap-1"><i data-lucide="sparkles" className="w-3 h-3 text-neonCyan"></i> Likuiditas Tersedia</span>
                                        </motion.div>

                                        {/* Card Pemasukan */}
                                        <motion.div 
                                            whileHover={{ y: -5 }}
                                            className="glass-panel p-5 rounded-2xl relative overflow-hidden bg-gradient-to-br from-darkCard to-emerald-950/10 shadow-xl group"
                                        >
                                            <div className="absolute -top-10 -right-10 w-24 h-24 bg-emerald-500/10 rounded-full blur-xl group-hover:bg-emerald-500/20 transition-all duration-500"></div>
                                            <div className="flex justify-between items-start mb-4">
                                                <span className="text-xs font-bold text-emerald-400 uppercase tracking-widest">Total Pemasukan</span>
                                                <div className="p-2 rounded-xl bg-emerald-500/10 text-emerald-400"><i data-lucide="arrow-down-left" className="w-4 h-4"></i></div>
                                            </div>

                                <div className="glass-panel p-4 rounded-xl flex flex-col md:flex-row md:items-center justify-between gap-4">
                                    <div className="relative flex-grow max-w-md">
                                        <i data-lucide="search" className="w-4 h-4 text-slate-400 absolute left-3.5 top-1/2 -translate-y-1/2"></i>
                                        <input 
                                            type="text" placeholder="Cari deskripsi transaksi..." value={searchQuery} onChange={(e)=>setSearchQuery(e.target.value)}
                                            className="w-full bg-white/5 border border-white/10 rounded-xl py-2 pl-10 pr-4 text-xs font-medium text-slate-200 focus:outline-none focus:border-neonCyan transition-all"
                                        />
                                    </div>
                                    <div className="flex flex-wrap items-center gap-2">
                                        <select value={filterType} onChange={(e)=>setFilterType(e.target.value)} className="bg-white/5 border border-white/10 rounded-xl p-2 text-xs text-slate-200 focus:outline-none font-medium">
                                            <option value="Semua" className="bg-darkBg">Semua Tipe</option>
                                            <option value="pemasukan" className="bg-darkBg">Pemasukan</option>
                                            <option value="pengeluaran" className="bg-darkBg">Pengeluaran</option>
                                        </select>
                                        <button onClick={()=>simulateExport('pdf')} className="flex items-center gap-1.5 px-3 py-2 text-xs font-bold rounded-xl bg-white/5 hover:bg-white/10 border border-white/5 text-slate-300 transition-all"><i data-lucide="file-text" className="w-3.5 h-3.5 text-red-400"></i> Export PDF</button>
                                        <button onClick={()=>simulateExport('excel')} className="flex items-center gap-1.5 px-3 py-2 text-xs font-bold rounded-xl bg-white/5 hover:bg-white/10 border border-white/5 text-slate-300 transition-all"><i data-lucide="file-spreadsheet" className="w-3.5 h-3.5 text-emerald-400"></i> Excel</button>
                                    </div>
                                </div>

                                {/* Table Area */}
                                <div className="glass-panel rounded-2xl overflow-hidden border border-white/5">
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left border-collapse">
                                            <thead>
                                                <tr className="border-b border-white/5 bg-white/[0.02] text-[10px] uppercase font-bold tracking-widest text-slate-400">
                                                    <th className="p-4">Tanggal</th>
                                                    <th className="p-4">Kategori</th>
                                                    <th className="p-4">Catatan / Keterangan</th>
                                                    <th className="p-4">Tipe</th>
                                                    <th className="p-4 text-right">Nominal</th>
                                                    <th className="p-4 text-center">Aksi</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-white/5 text-xs font-medium">
                                                {transactions
                                                    .filter(t => {
                                                        const matchSearch = t.note.toLowerCase().includes(searchQuery.toLowerCase()) || t.category.toLowerCase().includes(searchQuery.toLowerCase());
                                                        const matchType = filterType === 'Semua' || t.type === filterType;
                                                        return matchSearch && matchType;
                                                    })
                                                    .map(t => (
                                                        <tr key={t.id} className="hover:bg-white/[0.02] transition-colors group">
                                                            <td className="p-4 font-mono text-slate-400">{t.date}</td>
                                                            <td className="p-4"><span className="px-2 py-1 rounded-md bg-white/5 text-slate-300 border border-white/5">{t.category}</span></td>
                                                            <td className="p-4 text-slate-200 font-semibold">{t.note || '-'}</td>
                                                            <td className="p-4">
                                                                <span className={`px-2 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wider ${t.type === 'pemasukan' ? 'bg-emerald-500/10 text-emerald-400' : 'bg-rose-500/10 text-rose-400'}`}>
                                                                    {t.type}
                                                                </span>
                                                            </td>
                                                            <td className={`p-4 text-right font-bold font-mono text-sm ${t.type === 'pemasukan' ? 'text-emerald-400' : 'text-rose-400'}`}>
                                                                {t.type === 'pemasukan' ? '+' : '-'}{formatRupiah(t.amount)}
                                                            </td>
                                                            <td className="p-4">
                                                                <div className="flex justify-center gap-1.5 opacity-40 group-hover:opacity-100 transition-opacity">
                                                                    <button onClick={() => handleEditTx(t)} className="p-1 hover:bg-white/10 rounded text-neonCyan"><i data-lucide="edit-3" className="w-4 h-4"></i></button>
                                                                    <button onClick={() => handleDeleteTx(t.id)} className="p-1 hover:bg-white/10 rounded text-red-400"><i data-lucide="trash-2" className="w-4 h-4"></i></button>
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    ))}
                                            </tbody>
                                        </table>
                                    </div>
                                    {transactions.length === 0 && <p className="text-sm text-center text-slate-500 py-10">Tidak ditemukan records riwayat transaksi.</p>}
                                </div>
                            </div>
                        )}

                        {/* --- PAGE: LAPORAN ANALISIS --- */}
                        {activeTab === 'Laporan' && (
                            <div className="space-y-8">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div className="glass-panel p-6 rounded-2xl flex flex-col justify-between items-center bg-darkCard/40">
                                        <div className="w-full text-left mb-4">
                                            <h4 className="text-base font-bold text-white">Komposisi Transaksi Finansial</h4>
                                            <p className="text-xs text-slate-400">Perbandingan persentase total arus dana.</p>
                                        </div>
                                        <div className="w-64 h-64 relative">
                                            <PieChartContainer totalPemasukan={totalPemasukan} totalPengeluaran={totalPengeluaran} />
                                        </div>
                                    </div>

                                    <div className="glass-panel p-6 rounded-2xl flex flex-col justify-between space-y-4">
                                        <div>
                                            <h4 className="text-base font-bold text-white mb-1">Analisis Pengeluaran Pintar</h4>
                                            <p className="text-xs text-slate-400">Review status efisiensi finansial otomatis.</p>
                                        </div>
                                        <div className="p-4 rounded-xl border border-white/5 bg-white/5 space-y-3">
                                            <div className="flex items-center gap-3">
                                                <div className="p-2 rounded-xl bg-neonPurple/10 text-neonPurple"><i data-lucide="shield-check" className="w-5 h-5"></i></div>
                                                <div>
                                                    <h5 className="text-xs font-bold text-slate-200 uppercase tracking-wide">Rasio Tabungan Aman</h5>
                                                    <p className="text-sm font-semibold text-slate-400 mt-0.5">Rasio pengeluaran Anda saat ini berada pada tingkatan proporsional aman.</p>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="border-t border-white/5 pt-4 space-y-2 text-xs">
                                            <div className="flex justify-between"><span className="text-slate-400">Total Terhemat Bersih:</span> <span className="font-bold text-emerald-400 font-mono">{formatRupiah(totalSaldo)}</span></div>
                                            <div className="flex justify-between"><span className="text-slate-400">Efisiensi Konsumsi:</span> <span className="font-bold text-neonCyan font-mono">{totalPemasukan > 0 ? Math.round((totalSaldo/totalPemasukan)*100) : 0}% Dana Tersimpan</span></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* --- PAGE: PENGATURAN --- */}
                        {activeTab === 'Pengaturan' && (
                            <div className="glass-panel p-6 rounded-2xl max-w-xl mx-auto space-y-6">
                                <h4 className="text-base font-bold text-white mb-2">Konfigurasi Pengaturan Aplikasi</h4>
                                <div className="space-y-4 text-xs font-medium">
                                    <div className="flex justify-between items-center p-3 rounded-xl bg-white/5 border border-white/5">
                                        <div>
                                            <p className="text-slate-200 font-bold">Simpan Data Otomatis LocalStorage</p>
                                            <p className="text-[10px] text-slate-400 mt-0.5">Menyimpan data mutasi langsung pada memori browser.</p>
                                        </div>
                                        <span className="text-xs font-bold font-mono text-emerald-400">AKTIF / TRUE</span>
                                    </div>
                                    <div className="flex justify-between items-center p-3 rounded-xl bg-white/5 border border-white/5">
                                        <div>
                                            <p className="text-slate-200 font-bold">Clear All System Database</p>
                                            <p className="text-[10px] text-slate-400 mt-0.5">Menghapus seluruh rekaman riwayat transaksi awal.</p>
                                        </div>
                                        <button 
                                            onClick={() => {
                                                if(confirm('Apakah Anda yakin ingin menghapus seluruh data transaksi?')) {
                                                    localStorage.clear();
                                                    setTransactions([]);
                                                    setTargets([]);
                                                    setWishlist([]);
                                                    showToast('Semua database dibersihkan!', 'error');
                                                }
                                            }}
                                            className="px-3 py-1.5 rounded-lg bg-red-500/20 border border-red-500/30 text-red-400 font-bold uppercase text-[10px] hover:bg-red-500/40 transition-all"
                                        >
                                            Wipe Out Data
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                    </main>

                    {/* FOOTER WIDGET */}
                    <footer className="relative z-10 glass-panel border-t border-white/5 py-6 text-center text-xs text-slate-500 font-medium tracking-wide">
                        &copy; 2026 Tabunganku Inc. Built with Premium Cyber UI/UX System Ecosystem. All rights reserved.
                    </footer>

                </div>
            );
        }

        // --- SUB-COMPONENT: LINE/BAR FINANCIAL CHART CONTAINER ---
        function ChartContainer({ transactions }) {
            const canvasRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                if (!canvasRef.current) return;
                const ctx = canvasRef.current.getContext('2d');
                
                // Grouping Logic simple
                const sortedTxs = [...transactions].reverse().slice(-7);
                const labels = sortedTxs.map(t => t.date);
                const dataIn = sortedTxs.map(t => t.type === 'pemasukan' ? t.amount : 0);
                const dataOut = sortedTxs.map(t => t.type === 'pengeluaran' ? t.amount : 0);

                if (chartInstance.current) { chartInstance.current.destroy(); }

                chartInstance.current = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels.length > 0 ? labels : ['Day 1', 'Day 2', 'Day 3'],
                        datasets: [
                            {
                                label: 'Masuk',
                                data: dataIn.length > 0 ? dataIn : [0,0,0],
                                borderColor: '#00f2fe',
                                borderWidth: 3,
                                tension: 0.4,
                                fill: false,
                                pointBackgroundColor: '#00f2fe'
                            },
                            {
                                label: 'Keluar',
                                data: dataOut.length > 0 ? dataOut : [0,0,0],
                                borderColor: '#7f00ff',
                                borderWidth: 3,
                                tension: 0.4,
                                fill: false,
                                pointBackgroundColor: '#7f00ff'
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: 'rgba(255,255,255,0.4)', font: { size: 10 } } },
                            x: { grid: { display: false }, ticks: { color: 'rgba(255,255,255,0.4)', font: { size: 10 } } }
                        }
                    }
                });

                return () => { if (chartInstance.current) chartInstance.current.destroy(); };
            }, [transactions]);

            return <canvas ref={canvasRef}></canvas>;
        }

        // --- SUB-COMPONENT: PIE CHART LAPORAN CONTAINER ---
        function PieChartContainer({ totalPemasukan, totalPengeluaran }) {
            const canvasRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                if (!canvasRef.current) return;
                const ctx = canvasRef.current.getContext('2d');

                if (chartInstance.current) { chartInstance.current.destroy(); }

                chartInstance.current = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Pemasukan', 'Pengeluaran'],
                        datasets: [{
                            data: [totalPemasukan || 1, totalPengeluaran || 0],
                            backgroundColor: ['#00f2fe', '#7f00ff'],
                            borderWidth: 0,
                            hoverOffset: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } }
                    }
                });

                return () => { if (chartInstance.current) chartInstance.current.destroy(); };
            }, [totalPemasukan, totalPengeluaran]);

            return <canvas ref={canvasRef}></canvas>;
        }

        // Render Application Initializer
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
