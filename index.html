<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabunganku - Premium Personal Finance Platform</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#06070d',
                        darkCard: 'rgba(13, 16, 27, 0.7)',
                        neonCyan: '#00f2fe',
                        neonBlue: '#4facfe',
                        neonPurple: '#7f00ff',
                        neonPink: '#e100ff',
                    },
                    boxShadow: {
                        neonCyan: '0 0 20px rgba(0, 242, 254, 0.35)',
                        neonPurple: '0 0 20px rgba(127, 0, 255, 0.35)',
                        glass: '0 8px 32px 0 rgba(0, 0, 0, 0.4)',
                    }
                }
            }
        }
    </script>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
            background-color: #06070d;
        }
        /* Custom Premium Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.01); }
        ::-webkit-scrollbar-thumb { background: rgba(0, 242, 254, 0.25); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(127, 0, 255, 0.5); }
        
        /* Glassmorphism Dynamic Style */
        .glass-panel {
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.07);
        }
        
        .bg-glow-1 {
            background: radial-gradient(circle, rgba(0,242,254,0.12) 0%, rgba(0,0,0,0) 65%);
        }
        .bg-glow-2 {
            background: radial-gradient(circle, rgba(127,0,255,0.1) 0%, rgba(0,0,0,0) 65%);
        }
        
        @keyframes subtleFloat {
            0% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-6px) scale(1.01); }
            100% { transform: translateY(0px) scale(1); }
        }
        .animate-premium-float { animation: subtleFloat 5s ease-in-out infinite; }
    </style>
</head>
<body class="text-slate-100 antialiased selection:bg-neonCyan selection:text-darkBg">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = Motion;

        // --- FORMATTERS ---
        const formatRupiah = (num) => {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);
        };

        const parseCurrency = (str) => {
            return Number(str.replace(/[^0-9]/g, ''));
        };

        function App() {
            // --- APP ENGINE STATES ---
            const [isLoading, setIsLoading] = useState(true);
            const [isDarkMode, setIsDarkMode] = useState(true);
            const [activeTab, setActiveTab] = useState('Dashboard');
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [toasts, setToasts] = useState([]);
            
            // --- CLEAN USER DATA STATES (MOCK-FREE) ---
            const [transactions, setTransactions] = useState(() => JSON.parse(localStorage.getItem('tb_premium_txs')) || []);
            const [targets, setTargets] = useState(() => JSON.parse(localStorage.getItem('tb_premium_targets')) || []);
            const [wishlist, setWishlist] = useState(() => JSON.parse(localStorage.getItem('tb_premium_wishlist')) || []);

            // Transaction Interactive Form States
            const [txType, setTxType] = useState('pemasukan');
            const [txAmount, setTxAmount] = useState('');
            const [txCategory, setTxCategory] = useState('Gaji');
            const [txNote, setTxNote] = useState('');
            const [txDate, setTxDate] = useState(new Date().toISOString().split('T')[0]);
            const [editingTxId, setEditingTxId] = useState(null);

            // Filter Engine States
            const [searchQuery, setSearchQuery] = useState('');
            const [filterType, setFilterType] = useState('Semua');
            const [filterTime, setFilterTime] = useState('Semua');

            // Goal & Wishlist Dynamic Input States
            const [newTargetName, setNewTargetName] = useState('');
            const [newTargetAmount, setNewTargetAmount] = useState('');
            const [newTargetDeadline, setNewTargetDeadline] = useState('');
            const [newWishName, setNewWishName] = useState('');
            const [newWishPrice, setNewWishPrice] = useState('');
            const [newWishImage, setNewWishImage] = useState('');

            // --- DEEP STORAGE STORAGE WATCHER ---
            useEffect(() => { localStorage.setItem('tb_premium_txs', JSON.stringify(transactions)); }, [transactions]);
            useEffect(() => { localStorage.setItem('tb_premium_targets', JSON.stringify(targets)); }, [targets]);
            useEffect(() => { localStorage.setItem('tb_premium_wishlist', JSON.stringify(wishlist)); }, [wishlist]);

            // Simulation Intro Loader
            useEffect(() => {
                const timer = setTimeout(() => {
                    setIsLoading(false);
                }, 1600);
                return () => clearTimeout(timer);
            }, []);

            useEffect(() => { if (!isLoading) lucide.createIcons(); }, [isLoading, activeTab, isSidebarOpen, transactions, targets, wishlist, txType]);

            // --- PREMIUM TOAST SYSTEM ---
            const triggerToast = (msg, type = 'success') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, msg, type }]);
                setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3500);
            };

            // --- MATHEMATICAL RECKONING ---
            const totalPemasukan = transactions.filter(t => t.type === 'pemasukan').reduce((acc, curr) => acc + curr.amount, 0);
            const totalPengeluaran = transactions.filter(t => t.type === 'pengeluaran').reduce((acc, curr) => acc + curr.amount, 0);
            const totalSaldo = totalPemasukan - totalPengeluaran;

            // --- MUTATION OPERATIONS ---
            const saveTransactionHandler = (e) => {
                e.preventDefault();
                const processedAmount = parseCurrency(txAmount);
                if (!txAmount || processedAmount <= 0) return triggerToast('Silakan masukkan nominal valid!', 'error');

                if (editingTxId) {
                    setTransactions(prev => prev.map(t => t.id === editingTxId ? {
                        ...t, type: txType, amount: processedAmount, category: txCategory, note: txNote, date: txDate
                    } : t));
                    setEditingTxId(null);
                    triggerToast('Catatan transaksi berhasil diperbarui');
                } else {
                    const newRecord = {
                        id: Date.now(),
                        type: txType,
                        amount: processedAmount,
                        category: txCategory,
                        note: txNote,
                        date: txDate
                    };
                    setTransactions(prev => [newRecord, ...prev]);
                    triggerToast('Data transaksi berhasil direkam');
                }
                setTxAmount('');
                setTxNote('');
            };

            const initiateEditProcess = (tx) => {
                setEditingTxId(tx.id);
                setTxType(tx.type);
                setTxAmount(tx.amount.toString());
                setTxCategory(tx.category);
                setTxNote(tx.note);
                setTxDate(tx.date);
                if (activeTab !== 'Dashboard') setActiveTab('Dashboard');
            };

            const removeTransaction = (id) => {
                setTransactions(prev => prev.filter(t => t.id !== id));
                triggerToast('Data transaksi telah dihapus', 'error');
            };

            const buildTargetGoal = (e) => {
                e.preventDefault();
                if (!newTargetName || !newTargetAmount || !newTargetDeadline) return triggerToast('Semua kolom target wajib diisi!', 'error');
                const newGoal = {
                    id: Date.now(),
                    name: newTargetName,
                    target: parseCurrency(newTargetAmount),
                    current: 0,
                    deadline: newTargetDeadline
                };
                setTargets(prev => [...prev, newGoal]);
                setNewTargetName('');
                setNewTargetAmount('');
                setNewTargetDeadline('');
                triggerToast('Target finansial baru diinisialisasi');
            };

            const pushToWishlist = (e) => {
                e.preventDefault();
                if (!newWishName || !newWishPrice) return triggerToast('Nama dan Harga produk wajib diisi!', 'error');
                const newWishItem = {
                    id: Date.now(),
                    name: newWishName,
                    price: parseCurrency(newWishPrice),
                    saved: 0,
                    image: newWishImage || 'https://images.unsplash.com/photo-1531403009284-440f080d1e12?w=400&auto=format&fit=crop&q=60'
                };
                setWishlist(prev => [...prev, newWishItem]);
                setNewWishName('');
                setNewWishPrice('');
                setNewWishImage('');
                triggerToast('Barang impian berhasil didaftarkan');
            };

            const exportDataFile = (formatType) => {
                triggerToast(`Mengompilasi enkripsi data ${formatType.toUpperCase()}...`, 'info');
                setTimeout(() => {
                    triggerToast(`Unduhan Berhasil: Tabunganku_Report.${formatType}`);
                }, 1200);
            };

            return (
                <div className={`min-h-screen transition-colors duration-300 ${isDarkMode ? 'dark bg-darkBg text-slate-100' : 'bg-slate-50 text-slate-900'}`}>
                    
                    {/* Ambient Cyber Neon Glow Background */}
                    <div className="fixed inset-0 pointer-events-none z-0 overflow-hidden">
                        <div className="absolute top-[-15%] left-[-10%] w-[60vw] h-[60vw] bg-glow-1 rounded-full blur-[130px] animate-pulse"></div>
                        <div className="absolute bottom-[-15%] right-[-10%] w-[60vw] h-[60vw] bg-glow-2 rounded-full blur-[130px] animate-pulse" style={{ animationDuration: '7s' }}></div>
                        <div className="absolute inset-0 opacity-[0.012] dark:opacity-[0.025] bg-[linear-gradient(to_right,#808080_1px,transparent_1px),linear-gradient(to_bottom,#808080_1px,transparent_1px)] bg-[size:40px_40px]"></div>
                    </div>

                    {/* FUTURISTIC SKELETON INTRO LOADING */}
                    <AnimatePresence>
                        {isLoading && (
                            <motion.div 
                                className="fixed inset-0 bg-[#06070d] z-50 flex flex-col justify-center items-center"
                                exit={{ opacity: 0, transition: { duration: 0.5 } }}
                            >
                                <motion.div 
                                    className="relative w-20 h-20 flex items-center justify-center mb-4"
                                    animate={{ scale: [1, 1.05, 1] }}
                                    transition={{ repeat: Infinity, duration: 2 }}
                                >
                                    <div className="absolute inset-0 rounded-full border-2 border-t-neonCyan border-r-neonPurple border-b-transparent border-l-transparent animate-spin"></div>
                                    <i data-lucide="fingerprint" className="w-8 h-8 text-neonCyan"></i>
                                </motion.div>
                                <h1 className="text-xl font-bold tracking-[0.3em] bg-gradient-to-r from-neonCyan to-neonPurple bg-clip-text text-transparent uppercase font-mono">TABUNGANKU OS</h1>
                                <p className="text-[10px] text-slate-500 tracking-widest mt-1">SECURE BLOCKCHAIN ENGINE v2.26</p>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    {/* TOAST SYSTEM ENGINE */}
                    <div className="fixed top-6 right-6 z-50 flex flex-col gap-3 pointer-events-none">
                        <AnimatePresence>
                            {toasts.map(t => (
                                <motion.div
                                    key={t.id} layout
                                    initial={{ opacity: 0, x: 50, scale: 0.9 }}
                                    animate={{ opacity: 1, x: 0, scale: 1 }}
                                    exit={{ opacity: 0, scale: 0.8 }}
                                    className={`glass-panel pointer-events-auto flex items-center p-4 rounded-xl shadow-glass border-l-4 min-w-[300px] ${
                                        t.type === 'error' ? 'border-red-500 bg-red-950/30 text-red-200' : 
                                        t.type === 'info' ? 'border-neonBlue bg-blue-950/30 text-blue-200' : 'border-neonCyan bg-slate-900/80 text-neonCyan'
                                    }`}
                                >
                                    <i data-lucide={t.type === 'error' ? 'shield-alert' : t.type === 'info' ? 'cpu' : 'activity'} className="w-4 h-4 mr-3 flex-shrink-0"></i>
                                    <span className="text-xs font-semibold tracking-wide">{t.msg}</span>
                                </motion.div>
                            ))}
                        </AnimatePresence>
                    </div>

                    {/* PREMIUM TRANSLUCENT TOP NAV BAR */}
                    <nav className="sticky top-0 z-40 glass-panel border-b border-white/5 backdrop-blur-xl px-4 py-3.5 lg:px-8 flex justify-between items-center">
                        <div className="flex items-center gap-4">
                            <motion.button 
                                whileHover={{ scale: 1.05 }} whileTap={{ scale: 0.95 }}
                                onClick={() => setIsSidebarOpen(true)}
                                className="p-2 rounded-xl bg-white/5 hover:bg-white/10 text-slate-200 transition-all border border-white/5 shadow-inner"
                            >
                                <i data-lucide="align-left" className="w-5 h-5"></i>
                            </motion.button>
                            <div className="flex items-center gap-2.5">
                                <div className="p-2 rounded-xl bg-gradient-to-tr from-neonCyan to-neonBlue shadow-neonCyan/20 shadow-md">
                                    <i data-lucide="vault" className="w-4 h-4 text-darkBg"></i>
                                </div>
                                <span className="text-base font-bold tracking-tight text-white dark:text-white">
                                    Tabunganku<span className="text-neonCyan font-mono text-[10px] ml-1.5 bg-neonCyan/10 px-1.5 py-0.5 rounded border border-neonCyan/20">2026</span>
                                </span>
                            </div>
                        </div>

                        <div className="flex items-center gap-3">
                            <motion.button 
                                whileHover={{ scale: 1.05 }} whileTap={{ scale: 0.95 }}
                                onClick={() => {
                                    setIsDarkMode(!isDarkMode);
                                    document.documentElement.classList.toggle('dark');
                                    triggerToast(`Mode ${!isDarkMode ? 'Gelap' : 'Terang'} Diaktifkan`, 'info');
                                }}
                                className="p-2.5 rounded-xl bg-white/5 hover:bg-white/10 transition-all border border-white/5 text-amber-400 dark:text-neonCyan"
                            >
                                <i data-lucide={isDarkMode ? "sun" : "moon"} className="w-4 h-4"></i>
                            </motion.button>
                        </div>
                    </nav>

                    {/* SIDEBAR NAVIGATION SHEET */}
                    <AnimatePresence>
                        {isSidebarOpen && (
                            <>
                                <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} onClick={() => setIsSidebarOpen(false)} className="fixed inset-0 z-50 bg-black/60 backdrop-blur-md" />
                                <motion.div 
                                    initial={{ x: '-100%' }} animate={{ x: 0 }} exit={{ x: '-100%' }}
                                    transition={{ type: 'spring', damping: 24, stiffness: 190 }}
                                    className="fixed top-0 left-0 bottom-0 z-50 w-72 glass-panel bg-darkBg/80 backdrop-blur-2xl border-r border-white/10 p-6 flex flex-col justify-between shadow-2xl"
                                >
                                    <div className="space-y-8">
                                        <div className="flex justify-between items-center">
                                            <div className="flex items-center gap-2">
                                                <i data-lucide="command" className="w-4 h-4 text-neonPurple"></i>
                                                <span className="font-bold text-xs tracking-widest text-slate-400 uppercase font-mono">WORKSPACE</span>
                                            </div>
                                            <button onClick={() => setIsSidebarOpen(false)} className="p-1.5 rounded-lg hover:bg-white/10 text-slate-400"><i data-lucide="chevrons-left" className="w-4 h-4"></i></button>
                                        </div>

                                        <div className="flex flex-col gap-1.5">
                                            {[
                                                { name: 'Dashboard', icon: 'layout-grid' },
                                                { name: 'Pemasukan', icon: 'arrow-down-circle' },
                                                { name: 'Pengeluaran', icon: 'arrow-up-circle' },
                                                { name: 'Target Tabungan', icon: 'target' },
                                                { name: 'Wish List', icon: 'heart-handshake' },
                                                { name: 'Riwayat Transaksi', icon: 'history' },
                                                { name: 'Laporan', icon: 'bar-chart-3' },
                                                { name: 'Pengaturan', icon: 'settings-2' }
                                            ].map((item) => {
                                                const isActive = activeTab === item.name;
                                                return (
                                                    <motion.button
                                                        key={item.name} whileHover={{ x: 5, backgroundColor: 'rgba(255,255,255,0.03)' }}
                                                        onClick={() => {
                                                            if (item.name === 'Pemasukan') { setTxType('pemasukan'); setActiveTab('Dashboard'); }
                                                            else if (item.name === 'Pengeluaran') { setTxType('pengeluaran'); setActiveTab('Dashboard'); }
                                                            else { setActiveTab(item.name); }
                                                            setIsSidebarOpen(false);
                                                        }}
                                                        className={`flex items-center gap-3.5 px-4 py-3 rounded-xl transition-all text-xs font-semibold tracking-wide ${
                                                            isActive 
                                                            ? 'bg-gradient-to-r from-neonBlue/15 to-neonPurple/15 text-neonCyan border-l-2 border-neonCyan shadow-inner' 
                                                            : 'text-slate-400 hover:text-slate-100'
                                                        }`}
                                                    >
                                                        <i data-lucide={item.icon} className={`w-4 h-4 ${isActive ? 'text-neonCyan' : ''}`}></i>
                                                        {item.name}
                                                    </motion.button>
                                                );
                                            })}
                                        </div>
                                    </div>
                                    <div className="text-[10px] text-center text-slate-600 font-mono tracking-widest border-t border-white/5 pt-4">SYSTEM CORE SECURE</div>
                                </motion.div>
                            </>
                        )}
                    </AnimatePresence>

                    {/* MAIN CENTRALIZED ECOSYSTEM ARCHITECTURE */}
                    <main className="relative z-10 max-w-7xl mx-auto px-4 py-8 lg:px-8 space-y-8 pb-24">
                        
                        {/* HEAD HEADER TITLE BLOCK */}
                        <motion.div initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }} className="flex flex-col sm:flex-row justify-between sm:items-center gap-4 border-b border-white/5 pb-5">
                            <div>
                                <h2 className="text-2xl font-extrabold tracking-tight bg-gradient-to-r from-white via-slate-200 to-slate-400 bg-clip-text text-transparent font-mono uppercase">{activeTab}</h2>
                                <p className="text-xs text-slate-400 mt-1">Data finansial murni berbasis entri manual personal tanpa interferensi otomatis otomatis.</p>
                            </div>
                        </motion.div>

                        {/* --- COMPONENT VIEW: DASHBOARD --- */}
                        {activeTab === 'Dashboard' && (
                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                
                                {/* LEFT CORE INTERACTIVE CODES */}
                                <div className="lg:col-span-2 space-y-8">
                                    
                                    {/* THREE PRIMARY BALANCE METRICS */}
                                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-5">
                                        
                                        <motion.div whileHover={{ y: -4 }} className="glass-panel p-5 rounded-2xl bg-gradient-to-br from-darkCard to-cyan-950/10 shadow-neonCyan/5 shadow-xl relative overflow-hidden animate-premium-float">
                                            <div className="absolute top-0 right-0 p-3 opacity-20"><i data-lucide="wallet" className="w-8 h-8 text-neonCyan"></i></div>
                                            <span className="text-[10px] font-bold text-neonCyan uppercase tracking-widest block mb-2">Total Tabungan</span>
                                            <h3 className="text-xl font-black font-mono tracking-tight text-white">{formatRupiah(totalSaldo)}</h3>
                                        </motion.div>

                                        <motion.div whileHover={{ y: -4 }} className="glass-panel p-5 rounded-2xl bg-gradient-to-br from-darkCard to-emerald-950/10 shadow-xl relative overflow-hidden">
                                            <div className="absolute top-0 right-0 p-3 opacity-20"><i data-lucide="arrow-down-left" className="w-8 h-8 text-emerald-400"></i></div>
                                            <span className="text-[10px] font-bold text-emerald-400 uppercase tracking-widest block mb-2">Pemasukan</span>
                                            <h3 className="text-xl font-black font-mono tracking-tight text-emerald-400">{formatRupiah(totalPemasukan)}</h3>
                                        </motion.div>

                                        <motion.div whileHover={{ y: -4 }} className="glass-panel p-5 rounded-2xl bg-gradient-to-br from-darkCard to-rose-950/10 shadow-xl relative overflow-hidden">
                                            <div className="absolute top-0 right-0 p-3 opacity-20"><i data-lucide="arrow-up-right" className="w-8 h-8 text-rose-400"></i></div>
                                            <span className="text-[10px] font-bold text-rose-400 uppercase tracking-widest block mb-2">Pengeluaran</span>
                                            <h3 className="text-xl font-black font-mono tracking-tight text-rose-400">{formatRupiah(totalPengeluaran)}</h3>
                                        </motion.div>

                                    </div>

                                    {/* LINE DYNAMIC ANALYTICS CHART CONTAINER */}
                                    <div className="glass-panel p-6 rounded-2xl bg-darkCard/30">
                                        <div className="flex justify-between items-center mb-6">
                                            <div>
                                                <h4 className="text-sm font-bold text-white tracking-wide">Grafik Aliran Kas Terkini</h4>
                                                <p className="text-[11px] text-slate-400">Visualisasi data kronologis berdasarkan entri transaksi teranyar.</p>
                                            </div>
                                        </div>
                                        <div className="h-[260px] w-full">
                                            <AnalyticsLineChart transactions={transactions} />
                                        </div>
                                    </div>

                                    {/* LAST THREE ENTRIES HISTORY TABLE MINI */}
                                    <div className="glass-panel p-6 rounded-2xl space-y-4">
                                        <div className="flex justify-between items-center">
                                            <h4 className="text-sm font-bold text-white tracking-wide">Entri Mutasi Terakhir</h4>
                                            <button onClick={() => setActiveTab('Riwayat Transaksi')} className="text-xs font-bold text-neonCyan hover:underline flex items-center gap-1">Seluruh Riwayat <i data-lucide="arrow-right" className="w-3 h-3"></i></button>
                                        </div>
                                        <div className="space-y-3">
                                            {transactions.slice(0, 3).map(t => (
                                                <div key={t.id} className="flex justify-between items-center p-3.5 rounded-xl bg-white/[0.02] border border-white/5 hover:border-white/10 group transition-all">
                                                    <div className="flex items-center gap-3.5">
                                                        <div className={`p-2 rounded-lg ${t.type === 'pemasukan' ? 'bg-emerald-500/10 text-emerald-400' : 'bg-rose-500/10 text-rose-400'}`}>
                                                            <i data-lucide={t.type === 'pemasukan' ? 'download-cloud' : 'upload-cloud'} className="w-4 h-4"></i>
                                                        </div>
                                                        <div>
                                                            <p className="text-xs font-bold text-slate-200">{t.note || t.category}</p>
                                                            <p className="text-[10px] text-slate-500 font-mono mt-0.5">{t.date} • {t.category}</p>
                                                        </div>
                                                    </div>
                                                    <div className="flex items-center gap-4">
                                                        <span className={`text-xs font-bold font-mono ${t.type === 'pemasukan' ? 'text-emerald-400' : 'text-rose-400'}`}>
                                                            {t.type === 'pemasukan' ? '+' : '-'}{formatRupiah(t.amount)}
                                                        </span>
                                                        <div className="hidden group-hover:flex items-center gap-1 transition-all">
                                                            <button onClick={() => initiateEditProcess(t)} className="p-1 hover:bg-white/10 rounded text-neonCyan"><i data-lucide="pencil" className="w-3 h-3"></i></button>
                                                            <button onClick={() => removeTransaction(t.id)} className="p-1 hover:bg-white/10 rounded text-red-400"><i data-lucide="trash-2" className="w-3 h-3"></i></button>
                                                        </div>
                                                    </div>

                                    </div>
                                    <div className="p-4 rounded-xl border border-white/5 bg-white/5 space-y-3 text-xs">
                                        <div className="flex justify-between"><span className="text-slate-400">Bersih Tabungan:</span> <span className="font-bold text-emerald-400 font-mono">{formatRupiah(totalSaldo)}</span></div>
                                        <div className="flex justify-between"><span className="text-slate-400">Persentase Efisiensi:</span> <span className="font-bold text-neonCyan font-mono">{totalPemasukan > 0 ? Math.round((totalSaldo/totalPemasukan)*100) : 0}% Amortisasi</span></div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* --- COMPONENT VIEW: PENGATURAN --- */}
                        {activeTab === 'Pengaturan' && (
                            <div className="glass-panel p-6 rounded-2xl max-w-md mx-auto space-y-5 text-xs">
                                <h4 className="text-sm font-bold text-white mb-2 uppercase font-mono tracking-wide">Konfigurasi Pengaturan</h4>
                                <div className="flex justify-between items-center p-3 rounded-xl bg-white/5 border border-white/5">
                                    <div>
                                        <p className="text-slate-200 font-bold">Wipe Out Seluruh Database</p>
                                        <p className="text-[10px] text-slate-500 mt-0.5">Menghapus bersih seluruh memori entri data aplikasi.</p>
                                    </div>
                                    <button 
                                        onClick={() => {
                                            if (confirm('Apakah Anda yakin ingin mengosongkan kembali seluruh riwayat data secara permanen?')) {
                                                localStorage.clear();
                                                setTransactions([]);
                                                setTargets([]);
                                                setWishlist([]);
                                                triggerToast('Seluruh database dibersihkan total!', 'error');
                                            }
                                        }}
                                        className="px-3 py-1.5 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 font-bold uppercase text-[10px] hover:bg-red-500/20 transition-all"
                                    >
                                        Wipe Out Data
                                    </button>
                                </div>
                            </div>
                        )}

                    </main>

                    {/* CORE MINIMALIST PREMIUM FOOTER */}
                    <footer className="glass-panel border-t border-white/5 py-5 text-center text-[11px] text-slate-500 font-medium tracking-wider">
                        &copy; 2026 Tabunganku Platform Engine • Premium Architecture Core UI. All rights reserved.
                    </footer>

                </div>
            );
        }

        // --- CORE GRAPH SUB-COMPONENT: LINE CHART ---
        function AnalyticsLineChart({ transactions }) {
            const canvasRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                if (!canvasRef.current) return;
                const ctx = canvasRef.current.getContext('2d');
                
                const chronologicRecords = [...transactions].reverse().slice(-6);
                const chartLabels = chronologicRecords.map(t => t.date);
                const incomes = chronologicRecords.map(t => t.type === 'pemasukan' ? t.amount : 0);
                const outcomes = chronologicRecords.map(t => t.type === 'pengeluaran' ? t.amount : 0);

                if (chartInstance.current) { chartInstance.current.destroy(); }

                chartInstance.current = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: chartLabels.length > 0 ? chartLabels : ['Log Kosong'],
                        datasets: [
                            {
                                label: 'Masuk',
                                data: incomes.length > 0 ? incomes : [0],
                                borderColor: '#00f2fe',
                                borderWidth: 2.5,
                                tension: 0.35,
                                pointBackgroundColor: '#00f2fe',
                                fill: false
                            },
                            {
                                label: 'Keluar',
                                data: outcomes.length > 0 ? outcomes : [0],
                                borderColor: '#7f00ff',
                                borderWidth: 2.5,
                                tension: 0.35,
                                pointBackgroundColor: '#7f00ff',
                                fill: false
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: { grid: { color: 'rgba(255,255,255,0.02)' }, ticks: { color: 'rgba(255,255,255,0.3)', font: { size: 9 } } },
                            x: { grid: { display: false }, ticks: { color: 'rgba(255,255,255,0.3)', font: { size: 9 } } }
                        }
                    }
                });

                return () => { if (chartInstance.current) chartInstance.current.destroy(); };
            }, [transactions]);

            return <canvas ref={canvasRef}></canvas>;
        }

        // --- CORE GRAPH SUB-COMPONENT: DOUGHNUT PIE CHART ---
        function DoughnutPieChart({ totalPemasukan, totalPengeluaran }) {
            const canvasRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                if (!canvasRef.current) return;
                const ctx = canvasRef.current.getContext('2d');

                if (chartInstance.current) { chartInstance.current.destroy(); }

                chartInstance.current = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['Pemasukan', 'Pengeluaran'],
                        datasets: [{
                            data: [totalPemasukan || 1, totalPengeluaran || 0],
                            backgroundColor: ['#00f2fe', '#7f00ff'],
                            borderWidth: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } }
                    }
                });

                return () => { if (chartInstance.current) chartInstance.current.destroy(); };
            }, [totalPemasukan, totalPengeluaran]);

            return <canvas ref={canvasRef}></canvas>;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
